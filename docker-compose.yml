services:
  postgres:
    image: postgres:16-alpine
    container_name: tecopos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: tecopos-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${KAFKA_HOST_PORT}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8

  sso-service:
    build:
      context: ./apps/sso-service
      dockerfile: Dockerfile
    container_name: tecopos-sso-service
    restart: unless-stopped
    environment:
      SSO_BIND_HOST: ${SSO_BIND_HOST}
      SSO_PORT: ${SSO_PORT}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SSO_PORT}:3001"

  finance-service:
    build:
      context: ./apps/finance-service
      dockerfile: Dockerfile
    container_name: tecopos-finance-service
    restart: unless-stopped
    environment:
      FINANCE_BIND_HOST: ${FINANCE_BIND_HOST}
      FINANCE_PORT: ${FINANCE_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      MOCK_API_URL: ${MOCK_API_URL}
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${FINANCE_PORT}:3002"

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: tecopos-api-gateway
    restart: unless-stopped
    environment:
      SSO_HOST: ${SSO_HOST}
      SSO_PORT: ${SSO_PORT}
      FINANCE_HOST: ${FINANCE_HOST}
      FINANCE_PORT: ${FINANCE_PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - sso-service
      - finance-service
    ports:
      - "${API_GATEWAY_PORT}:3000"

volumes:
  postgres_data:
